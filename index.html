<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >
  <title>Where’s My Chippy?</title>
  <meta
    name="description"
    content="A hidden-object web game where you search different scenes to find Chippy."
  >

  <style>
    :root {
      --desktop-green: #007c6b;
      --win98-gray: #c0c0c0;
      --win98-dark: #808080;
      --win98-darker: #404040;
      --win98-light: #ffffff;
      --win98-blue: #000080;
      --scene-width: 640px;
      --scene-height: 400px;
      --startbar-height: 42px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      color: #000000;
      font-family: Tahoma, Verdana, Arial, sans-serif;
      font-size: 12px;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background: var(--desktop-green);
      position: relative;
    }

    /* --- Faux Win98 desktop dressing --- */

    .desktop-icons {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 1;

      /*
        Adjust these to taste depending on your source asset
      */
      width: 170px;
      height: auto;
      pointer-events: none;
      user-select: none;
    }

    .desktop-startbar {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      height: var(--startbar-height);
      object-fit: fill;
      z-index: 2;
      pointer-events: none;
      user-select: none;
    }

    /* --- Main app window --- */

    .app-shell {
      position: relative;
      z-index: 3;
      min-height: 100vh;
      padding: 24px 24px calc(var(--startbar-height) + 24px) 24px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .window {
      width: 700px;
      max-width: 100%;
      background: var(--win98-gray);
      border-top: 2px solid var(--win98-light);
      border-left: 2px solid var(--win98-light);
      border-right: 2px solid var(--win98-darker);
      border-bottom: 2px solid var(--win98-darker);
    }

    .titlebar {
      background: linear-gradient(to right, #000080, #1084d0);
      color: #ffffff;
      font-weight: bold;
      padding: 4px 8px;
      border-bottom: 1px solid var(--win98-dark);
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 24px;
    }

    .titlebar-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 8px;
    }

    .titlebar-buttons {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }

    .titlebar-button {
      width: 18px;
      height: 16px;
      background: var(--win98-gray);
      border-top: 1px solid var(--win98-light);
      border-left: 1px solid var(--win98-light);
      border-right: 1px solid var(--win98-darker);
      border-bottom: 1px solid var(--win98-darker);
      color: #000000;
      font-size: 10px;
      line-height: 14px;
      text-align: center;
      font-family: "MS Sans Serif", Tahoma, sans-serif;
      user-select: none;
    }

    .content {
      padding: 10px;
      background: var(--win98-gray);
    }

    .controls {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
      padding: 8px;
      background: var(--win98-gray);
      border-top: 1px solid var(--win98-light);
      border-left: 1px solid var(--win98-light);
      border-right: 1px solid var(--win98-dark);
      border-bottom: 1px solid var(--win98-dark);
    }

    .controls label {
      font-weight: bold;
    }

    .xpselect,
    .xpbutton {
      font: inherit;
      color: #000000;
    }

    .xpbutton {
      padding: 2px 10px;
      background: var(--win98-gray);
      border-top: 1px solid var(--win98-light);
      border-left: 1px solid var(--win98-light);
      border-right: 1px solid var(--win98-darker);
      border-bottom: 1px solid var(--win98-darker);
      cursor: pointer;
    }

    .xpbutton:active {
      border-top: 1px solid var(--win98-darker);
      border-left: 1px solid var(--win98-darker);
      border-right: 1px solid var(--win98-light);
      border-bottom: 1px solid var(--win98-light);
    }

    .xpselect {
      background: #ffffff;
      border: 1px solid var(--win98-dark);
      padding: 1px;
    }

    .scene-wrap {
      padding: 8px;
      background: var(--win98-gray);
      border-top: 1px solid var(--win98-light);
      border-left: 1px solid var(--win98-light);
      border-right: 1px solid var(--win98-dark);
      border-bottom: 1px solid var(--win98-dark);
    }

    .scene {
      position: relative;
      width: var(--scene-width);
      height: var(--scene-height);
      max-width: 100%;
      border: 1px solid var(--win98-dark);
      background-image: url("park_bg.png");
      background-repeat: no-repeat;
      background-size: contain;
      background-color: #000000;
      overflow: hidden;
    }

    .hotspot {
      position: absolute;
      margin: 0;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }

    .hotspot:hover {
      background: transparent;
      outline: none;
    }

    .hotspot:focus-visible {
      outline: 2px solid #000080;
    }

    /*
      For debugging hotspot positions, temporarily replace the rule above with:

      .hotspot {
        background: rgba(255, 0, 0, 0.35);
      }
    */

    #chippy {
      position: absolute;
      left: 420px;
      top: 215px;
      width: 250px;
      height: 250px;
      display: none;
      user-select: none;
      pointer-events: none;
    }

    .winbanner {
      display: none;
      margin-top: 10px;
      padding: 8px;
      text-align: center;
      font-weight: bold;
      letter-spacing: 1px;
      background: var(--win98-gray);
      color: #000000;
      border-top: 1px solid var(--win98-light);
      border-left: 1px solid var(--win98-light);
      border-right: 1px solid var(--win98-darker);
      border-bottom: 1px solid var(--win98-darker);
    }

    .winbanner.flashA {
      background: #000080;
      color: #ffffff;
    }

    .winbanner.flashB {
      background: #ffff00;
      color: #000000;
    }

    .panel {
      margin-top: 10px;
      padding: 8px;
      background: var(--win98-gray);
      border-top: 1px solid var(--win98-light);
      border-left: 1px solid var(--win98-light);
      border-right: 1px solid var(--win98-dark);
      border-bottom: 1px solid var(--win98-dark);
      min-height: 40px;
      line-height: 1.4;
    }

    .footer-joke {
      margin-top: 14px;
      text-align: center;
      color: #333333;
    }

    .footer-joke-text {
      margin-bottom: 8px;
      font-size: 12px;
    }

    .footer-gif {
      display: block;
      margin: 0 auto;
      border: 0;
      max-width: 100%;
      height: auto;
    }

    @media (max-width: 760px) {
      .app-shell {
        justify-content: flex-start;
      }

      .window {
        width: 100%;
      }

      .scene {
        width: 100%;
        height: auto;
        aspect-ratio: 640 / 400;
      }

      .desktop-icons {
        width: 120px;
      }
    }
  </style>
</head>
<body>
  <!-- Faux desktop decorations -->
  <img
    class="desktop-icons"
    src="win_98_icons.png"
    alt=""
    aria-hidden="true"
  >

  <img
    class="desktop-startbar"
    src="win_98_startbar.png"
    alt=""
    aria-hidden="true"
  >

  <div class="app-shell">
    <main class="window" aria-labelledby="game-title">
      <header class="titlebar" id="game-title">
        <div class="titlebar-text">Where’s My Chippy?</div>
        <div class="titlebar-buttons" aria-hidden="true">
          <div class="titlebar-button">_</div>
          <div class="titlebar-button">□</div>
          <div class="titlebar-button">×</div>
        </div>
      </header>

      <section class="content">
        <div class="controls">
          <label for="sceneSelect">Search Location:</label>

          <select id="sceneSelect" class="xpselect" name="scene">
            <option value="park">The Park</option>
            <option value="sea">Under the Sea</option>
            <option value="redlight">Red Light District</option>
          </select>

          <button id="resetButton" class="xpbutton" type="button">Reset</button>
        </div>

        <div class="scene-wrap">
          <section
            id="scene"
            class="scene"
            aria-label="Search scene"
          >
            <button
              id="hotspot1"
              class="hotspot"
              type="button"
              aria-label="Search hotspot 1"
            ></button>

            <button
              id="hotspot2"
              class="hotspot"
              type="button"
              aria-label="Search hotspot 2"
            ></button>

            <button
              id="hotspot3"
              class="hotspot"
              type="button"
              aria-label="Search hotspot 3"
            ></button>

            <button
              id="hotspot4"
              class="hotspot"
              type="button"
              aria-label="Search correct hotspot"
            ></button>

            <img id="chippy" src="chippy.gif" alt="Chippy has been found">
          </section>
        </div>

        <div id="winBanner" class="winbanner" aria-live="polite">
          ★ YOU FOUND CHIPPY! ★
        </div>

        <div
          id="message"
          class="panel"
          role="status"
          aria-live="polite"
        >
          Click around and find Chippy.
        </div>

        <div class="footer-joke">
          <div class="footer-joke-text">Endless fun from the 103 pages of:</div>
          <img
            class="footer-gif"
            src="theinnernette.gif"
            alt="The Innernette"
          >
        </div>
      </section>
    </main>
  </div>

  <audio id="audioIntro" preload="auto" src="where_is_my_chippy.wav"></audio>
  <audio id="audioSniff" preload="auto" src="sniff_chippy.wav"></audio>
  <audio id="audioWorried" preload="auto" src="chippy_im_worried.wav"></audio>
  <audio id="audioChip" preload="auto" src="chipchipchipchip.wav"></audio>
  <audio id="audioFound" preload="auto" src="there_is_my_chippy.wav"></audio>
  <audio id="audioReset" preload="auto" src="great_job.wav"></audio>

  <script>
    (() => {
      let gameWon = false;
      let currentScene = "park";
      let introAudioUnlocked = false;
      let winFlashTimer = null;
      let winFlashState = false;

      const scenes = {
        park: {
          bg: "park_bg.png",
          intro: "Click around the park and find Chippy.",
          wrong1: "Nope, not in the garbage.",
          wrong2: "Nope, not in the tree.",
          wrong3: "Nope, not in the playground.",
          h1: [75, 250, 80, 140],
          h2: [80, 110, 40, 40],
          h3: [380, 70, 150, 100],
          h4: [540, 300, 90, 90],
          cpos: [420, 215, 250, 250]
        },

        sea: {
          bg: "sea_bg.png",
          intro: "Click around under the sea and find Chippy.",
          wrong1: "Nope, not in the shell.",
          wrong2: "Nope, not in the sea cave.",
          wrong3: "Nope, not in the shipwreck.",
          h1: [40, 270, 120, 90],
          h2: [60, 180, 100, 70],
          h3: [200, 90, 150, 120],
          h4: [500, 260, 100, 100],
          cpos: [420, 200, 250, 250]
        },

        redlight: {
          bg: "redlight_bg.png",
          intro: "Click around the red light district and find Chippy.",
          wrong1: "Nope, not in the garbage.",
          wrong2: "Nope, not in the hotel.",
          wrong3: "Nope, not in the topless club.",
          h1: [50, 230, 120, 120],
          h2: [210, 100, 100, 140],
          h3: [390, 110, 150, 120],
          h4: [520, 260, 90, 90],
          cpos: [420, 210, 250, 250]
        }
      };

      const els = {
        scene: document.getElementById("scene"),
        message: document.getElementById("message"),
        chippy: document.getElementById("chippy"),
        sceneSelect: document.getElementById("sceneSelect"),
        resetButton: document.getElementById("resetButton"),
        hotspot1: document.getElementById("hotspot1"),
        hotspot2: document.getElementById("hotspot2"),
        hotspot3: document.getElementById("hotspot3"),
        hotspot4: document.getElementById("hotspot4"),
        winBanner: document.getElementById("winBanner"),
        audioIntro: document.getElementById("audioIntro"),
        audioSniff: document.getElementById("audioSniff"),
        audioWorried: document.getElementById("audioWorried"),
        audioChip: document.getElementById("audioChip"),
        audioFound: document.getElementById("audioFound"),
        audioReset: document.getElementById("audioReset")
      };

      function say(message) {
        els.message.textContent = message;
      }

      function playAudio(audioEl) {
        if (!audioEl) {
          return;
        }

        try {
          audioEl.pause();
          audioEl.currentTime = 0;
          const playPromise = audioEl.play();

          if (playPromise && typeof playPromise.catch === "function") {
            playPromise.catch(() => {});
          }
        } catch (error) {
        }
      }

      function setBox(el, left, top, width, height) {
        el.style.left = `${left}px`;
        el.style.top = `${top}px`;
        el.style.width = `${width}px`;
        el.style.height = `${height}px`;
      }

      function stopWinBannerFlash() {
        if (winFlashTimer) {
          window.clearInterval(winFlashTimer);
          winFlashTimer = null;
        }

        els.winBanner.className = "winbanner";
        els.winBanner.style.display = "none";
      }

      function startWinBannerFlash() {
        stopWinBannerFlash();

        els.winBanner.style.display = "block";
        els.winBanner.className = "winbanner flashA";
        winFlashState = false;

        winFlashTimer = window.setInterval(() => {
          winFlashState = !winFlashState;

          if (winFlashState) {
            els.winBanner.className = "winbanner flashA";
          } else {
            els.winBanner.className = "winbanner flashB";
          }
        }, 350);

        window.setTimeout(() => {
          if (winFlashTimer) {
            window.clearInterval(winFlashTimer);
            winFlashTimer = null;
          }
          els.winBanner.className = "winbanner flashA";
        }, 4000);
      }

      function loadScene(sceneName, playIntroSound = false) {
        const sceneData = scenes[sceneName];
        if (!sceneData) {
          return;
        }

        currentScene = sceneName;
        gameWon = false;
        stopWinBannerFlash();

        els.scene.style.backgroundImage = `url("${sceneData.bg}")`;
        els.chippy.style.display = "none";

        setBox(els.hotspot1, ...sceneData.h1);
        setBox(els.hotspot2, ...sceneData.h2);
        setBox(els.hotspot3, ...sceneData.h3);
        setBox(els.hotspot4, ...sceneData.h4);

        els.chippy.style.left = `${sceneData.cpos[0]}px`;
        els.chippy.style.top = `${sceneData.cpos[1]}px`;
        els.chippy.style.width = `${sceneData.cpos[2]}px`;
        els.chippy.style.height = `${sceneData.cpos[3]}px`;

        els.sceneSelect.value = sceneName;
        say(sceneData.intro);

        if (playIntroSound) {
          playAudio(els.audioIntro);
        }
      }

      function clickWrong(whichOne) {
        if (gameWon) {
          return;
        }

        const sceneData = scenes[currentScene];
        if (!sceneData) {
          return;
        }

        if (whichOne === 1) {
          say(sceneData.wrong1);
          playAudio(els.audioSniff);
        } else if (whichOne === 2) {
          say(sceneData.wrong2);
          playAudio(els.audioWorried);
        } else if (whichOne === 3) {
          say(sceneData.wrong3);
          playAudio(els.audioChip);
        }
      }

      function foundChippy() {
        if (gameWon) {
          return;
        }

        gameWon = true;
        els.chippy.style.display = "block";
        say("There he is! You found Chippy!");
        playAudio(els.audioFound);
        startWinBannerFlash();
      }

      function resetGame() {
        loadScene(currentScene, false);
        playAudio(els.audioReset);
      }

      function unlockIntroAudioOnce() {
        if (introAudioUnlocked) {
          return;
        }
        introAudioUnlocked = true;
        playAudio(els.audioIntro);
      }

      els.sceneSelect.addEventListener("change", () => {
        loadScene(els.sceneSelect.value, true);
      });

      els.resetButton.addEventListener("click", resetGame);
      els.hotspot1.addEventListener("click", () => clickWrong(1));
      els.hotspot2.addEventListener("click", () => clickWrong(2));
      els.hotspot3.addEventListener("click", () => clickWrong(3));
      els.hotspot4.addEventListener("click", foundChippy);

      document.addEventListener("pointerdown", unlockIntroAudioOnce, { once: true });
      document.addEventListener("keydown", unlockIntroAudioOnce, { once: true });

      loadScene("park", false);
    })();
  </script>
</body>
</html>
