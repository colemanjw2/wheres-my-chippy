<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>Where's My Chippy?</title>

<style type="text/css">
body {
    margin: 0;
    padding: 0;
    font-family: Tahoma, Verdana, Arial, sans-serif;
    font-size: 12px;
    background: #ECE9D8;
    color: #000000;
}

.window {
    width: 660px;
    margin: 20px auto;
    border: 1px solid #7F9DB9;
    background: #FFFFFF;
}

.titlebar {
    background: url('/assets/xpbar.png') repeat-x;
    color: #FFFFFF;
    font-weight: bold;
    padding: 6px 10px;
}

.content {
    padding: 10px;
}

.scene {
    position: relative;
    width: 640px;
    height: 400px;
    border: 1px solid #7F9DB9;
    background: url('park_bg.png') no-repeat;
    overflow: hidden;
}

.hotspot {
    position: absolute;
    cursor: pointer;
    background: transparent;
    /*background: #FF0000;
    filter: alpha(opacity=70);
/* for debugging hotspot positions, uncomment the above and comment out the line below */
}

.hotspot:hover {
    background: #FFFF99;
    filter: alpha(opacity=25);
}

#chippy {
    position: absolute;
    left: 420px;
    top: 215px;
    width: 250px;
    height: 250px;
    display: none;
}

.panel {
    margin-top: 10px;
    padding: 8px;
    border: 1px solid #7F9DB9;
    background: #F5F5F5;
}

.buttonbar {
    margin-top: 10px;
}

.xpbutton {
    font-family: Tahoma, Verdana, Arial, sans-serif;
    font-size: 12px;
    padding: 3px 10px;
}

.xpselect {
    font-family: Tahoma, Verdana, Arial, sans-serif;
    font-size: 12px;
}
</style>

<script type="text/javascript">
var gameWon = false;
var soundCounter = 0;
var currentScene = "park";

/*
    Scene data:
    bg      = background image
    intro   = intro text when scene loads
    wrong1  = message for hotspot 1
    wrong2  = message for hotspot 2
    wrong3  = message for hotspot 3

    h1/h2/h3/h4 = hotspot positions
    cpos        = Chippy reveal image position

    Format:
    left, top, width, height
*/

var scenes = {
    park: {
        bg: "park_bg.png",
        intro: "Click around the park and find Chippy.",
        wrong1: "Nope, not in the garbage.",
        wrong2: "Nope, not in the tree.",
        wrong3: "Nope, not in the playground.",

        h1: [75, 250, 80, 140],
        h2: [80, 110, 40, 40],
        h3: [380, 70, 150, 100],
        h4: [540, 300, 90, 90],

        cpos: [420, 215, 250, 250]
    },

    sea: {
        bg: "sea_bg.png",
        intro: "Click around under the sea and find Chippy.",
        wrong1: "Nope, not in the shell.",
        wrong2: "Nope, not in the sea cave.",
        wrong3: "Nope, not in the shipwreck.",

        /* placeholder hotspot positions — align these [left,top,width,height]*/
        h1: [40, 270, 120, 90],
        h2: [60, 180, 100, 70],
        h3: [200, 90, 150, 120],
        h4: [500, 260, 100, 100],

        cpos: [420, 200, 250, 250]
    },

    redlight: {
        bg: "redlight_bg.png",
        intro: "Click around the red light district and find Chippy.",
        wrong1: "Nope, not in the garbage.",
        wrong2: "Nope, not in the hotel.",
        wrong3: "Nope, not in the topless club.",

        /* placeholder hotspot positions — align these  */
        h1: [50, 230, 120, 120],
        h2: [210, 100, 100, 140],
        h3: [390, 110, 150, 120],
        h4: [520, 260, 90, 90],

        cpos: [420, 210, 250, 250]
    }
};

function say(msg) {
    document.getElementById('message').innerHTML = msg;
}

function playSfx(file) {
    var s = document.getElementById('sfx');
    soundCounter = soundCounter + 1;
    s.src = file + "?v=" + soundCounter;
}

function setBox(id, left, top, width, height) {
    var el = document.getElementById(id);
    el.style.left = left + "px";
    el.style.top = top + "px";
    el.style.width = width + "px";
    el.style.height = height + "px";
}

function loadScene(sceneName, playIntroSound) {
    var sceneData = scenes[sceneName];
    var scene = document.getElementById('scene');
    var chippy = document.getElementById('chippy');
    var selector = document.getElementById('sceneSelect');

    currentScene = sceneName;
    gameWon = false;

    scene.style.backgroundImage = "url('" + sceneData.bg + "')";
    chippy.style.display = 'none';

    setBox('hotspot1', sceneData.h1[0], sceneData.h1[1], sceneData.h1[2], sceneData.h1[3]);
    setBox('hotspot2', sceneData.h2[0], sceneData.h2[1], sceneData.h2[2], sceneData.h2[3]);
    setBox('hotspot3', sceneData.h3[0], sceneData.h3[1], sceneData.h3[2], sceneData.h3[3]);
    setBox('hotspot4', sceneData.h4[0], sceneData.h4[1], sceneData.h4[2], sceneData.h4[3]);

    chippy.style.left = sceneData.cpos[0] + "px";
    chippy.style.top = sceneData.cpos[1] + "px";
    chippy.style.width = sceneData.cpos[2] + "px";
    chippy.style.height = sceneData.cpos[3] + "px";

    selector.value = sceneName;
    say(sceneData.intro);

    if (playIntroSound) {
        playSfx('where_is_my_chippy.wav');
    }
}

function initPage() {
    loadScene("park", true);
}

function clickWrong(whichOne) {
    var sceneData = scenes[currentScene];

    if (gameWon) {
        return;
    }

    if (whichOne == 1) {
        say(sceneData.wrong1);
        playSfx('sniff_chippy.wav');
    }
    else if (whichOne == 2) {
        say(sceneData.wrong2);
        playSfx('chippy_im_worried.wav');
    }
    else if (whichOne == 3) {
        say(sceneData.wrong3);
        playSfx('chipchipchipchip.wav');
    }
}

function foundChippy() {
    if (gameWon) {
        return;
    }

    gameWon = true;
    document.getElementById('chippy').style.display = 'block';
    say("There he is! You found Chippy!");
    playSfx('there_is_my_chippy.wav');
}

function resetGame() {
    loadScene(currentScene, false);
    playSfx('great_job.wav');
}

function sceneChanged() {
    var selector = document.getElementById('sceneSelect');
    loadScene(selector.value, true);
}
</script>
</head>

<body onload="initPage()">

<bgsound id="sfx" src="" loop="1">

<div class="window">
    <div class="titlebar">Where's My Chippy?</div>

    <div class="content">

        <div class="buttonbar" style="margin-bottom:10px;">
            <b>Search Location:</b>
            <select id="sceneSelect" class="xpselect" onchange="sceneChanged()">
                <option value="park">The Park</option>
                <option value="sea">Under the Sea</option>
                <option value="redlight">Red Light District</option>
            </select>
            &nbsp;
            <input class="xpbutton" type="button" value="Reset" onclick="resetGame()">
        </div>

        <div id="scene" class="scene">

            <!-- Wrong hotspot 1 -->
            <div id="hotspot1" class="hotspot" onclick="clickWrong(1)"></div>

            <!-- Wrong hotspot 2 -->
            <div id="hotspot2" class="hotspot" onclick="clickWrong(2)"></div>

            <!-- Wrong hotspot 3 -->
            <div id="hotspot3" class="hotspot" onclick="clickWrong(3)"></div>

            <!-- Correct hotspot -->
            <div id="hotspot4" class="hotspot" onclick="foundChippy()"></div>

            <!-- Chippy reveal -->
            <img id="chippy" src="chippy.gif" alt="Chippy">
        </div>

        <div class="panel" id="message">
            Click around and find Chippy.
        </div>

    </div>
</div>

</body>
</html>
